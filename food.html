  <!-- ✅ FOOD自動生成（このページ専用） -->
  <script>
    // 画像が未確定なら placeholder を使う
    const PLACEHOLDER_IMG = "./img/food-placeholder.jpg";

    // ✅ 店舗を増やす時はここに1行足すだけ
    // img: 実画像のパスに差し替えOK
    // tags: メニュー（配列）
    // instagram: 無ければ "" にする（準備中表示になる）
    const FOODS = [
      {
        id: "careno",
        name: "カレのカレー",
        img: "./img/food/careno-curry.jpg",
        tags: ["カレー"],
        instagram: "https://www.instagram.com/careno_curry/"
      },
      {
        id: "girasole",
        name: "'O Girasole",
        img: "./img/food/girasole-pizza.jpg",
        tags: ["ピザ"],
        instagram: "https://www.instagram.com/o.girasole/",
        pos: "50% 100%"
      },
      {
        id: "otoppe",
        name: "おとっぺ",
        img: "/img/food/otoppe.jpg",
        tags: ["ソーセージ", "ベーコン"],
        instagram: "https://www.instagram.com/oyama.otoppe/"
      },
      {
        id: "shikisaikan",
        name: "小山市まちの駅 思季彩館",
        img:"/img/food/sikisaikan.jpg",
        tags: ["クラフトビール"],
        instagram: "https://www.instagram.com/shikisaikan.808/"
      },
      {
        id: "adorer",
        name: "crepe Adorer",
        img:"/img/food/crepe-adorer.jpg",
        tags: ["クレープ"],
        instagram: "https://www.instagram.com/crepe_adorer/"
      },
      {
        id: "eazy",
        name: "EAZY PIZZA",
        img: "./img/food/eazy-pizza2.jpg",
        tags: ["タコライス"],
        instagram: "https://www.instagram.com/eazy_pizza_jp/"
      },
      {
        id: "bunsweets",
        name: "Bun Sweets",
        img: "./img/food/bunsweets.jpg",
        tags: ["リンゴ飴","ワッフル"],
        instagram: "https://www.instagram.com/bun_sweets/"
      },
      {
        id: "agopakkan",
        name: "あごぱっかーん",
        img: "./img/food/agopakkan.jpg",
        tags: ["ハンバーガー"],
        instagram: "https://www.instagram.com/agopakkan/"
      },
      {
        id: "ichigonosato",
        name: "いちごの里ファーム",
        img: "./img/food/ichigonosato.jpg",
        tags: ["クレープ", "スムージー"],
        instagram: "https://www.instagram.com/itigonosatofarm/",
        fit: "contain"
      },
      {
        id: "maruta",
        name: "酒食 まるた",
        img: "./img/food/maruta.jpg",
        tags: ["芋フライ","唐揚げ"],
        instagram: "https://www.instagram.com/syusyokumaruta/"
      },
      {
        id: "usiyanosegare",
        name: "うしやのせがれ",
        img: "./img/food/usiyanosegare.png",
        tags: ["ハンバーガー"],
        instagram: "https://www.instagram.com/usyn_ksgr?igsh=NWphdzE0Zno0M2Qy",
        fit: "cover",
        pos: "50% 45%"
      },
      {
        id: "inase",
        name: "和処いなせ",
        img: "./img/food/inase2.png",
        tags: ["coming soon"],
        instagram: "https://www.instagram.com/nagomidoko_inase/",
        fit: "contain",
        pos: "50% 50%"
      },
      {
        id: "ao",
        name: "藍",
        img: "./img/food/ao2.jpg",
        tags: ["お好み焼き", "オムそば"],
        instagram: "https://www.instagram.com/daotianzhenlidaotian?igsh=MTl6ejBna214eGVsdg==",
        fit: "cover",
        pos: "50% 50%"
      },
      {
        id: "ippinkou",
        name: "一品香",
        img: "./img/food/ippinkou.jpg",
        tags: ["餃子"],
        instagram: "https://www.instagram.com/ippinkou.marumen/",
        fit: "contain",
        pos: "50% 50%"
      }
    ];

    const IG_SVG = `
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2c1.7 0 3 1.3 3 3v10c0 1.7-1.3 3-3 3H7c-1.7 0-3-1.3-3-3V7c0-1.7 1.3-3 3-3h10zm-5 3.5A4.5 4.5 0 1 0 12 17a4.5 4.5 0 0 0 0-9zm0 7.3a2.8 2.8 0 1 1 0-5.6 2.8 2.8 0 0 1 0 5.6zM17.5 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
      </svg>
    `;

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderFoodCard(item){
      const name = escapeHtml(item.name);
      const img = escapeHtml(item.img || PLACEHOLDER_IMG);
      const pos = (item.pos || "").trim();
      const fit = item.fit || "cover";
      const thumbClass = fit === "contain" ? "cfFoodThumb is-contain" : "cfFoodThumb";

      const posAttr = pos
        ? ` style="object-fit:${fit}; object-position:${escapeHtml(pos)};"`
        : ` style="object-fit:${fit};"`;

      const tags = Array.isArray(item.tags) ? item.tags : [];
      const ig = (item.instagram || "").trim();

      const tagHtml = tags.map(t => `<span class="cfTag">${escapeHtml(t)}</span>`).join("");

      const igHtml = ig
        ? `
          <a class="cfFoodInstaBtn"
            href="${escapeHtml(ig)}"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="${name}のInstagramを見る">
            <span class="cfFoodInstaBtnIcon" aria-hidden="true">${IG_SVG}</span>
            <span class="cfFoodInstaBtnText">Instagram</span>
            <span class="cfFoodInstaBtnArrow" aria-hidden="true">↗</span>
          </a>
        `
        : `
          <div class="cfFoodInstaBtn is-disabled" aria-label="${name}のInstagramは準備中です">
            <span class="cfFoodInstaBtnIcon" aria-hidden="true">${IG_SVG}</span>
            <span class="cfFoodInstaBtnText">Instagram（準備中）</span>
          </div>
        `;

      return `
        <article class="cfFoodCard">
          <div class="${thumbClass}">
            <img src="${img}" alt="${name}" loading="lazy"${posAttr}>
          </div>

          <div class="cfFoodBody">
            <h3 class="cfFoodName">${name}</h3>

            ${igHtml}

            <div class="cfFoodMeta">
              <div class="cfFoodMetaLabel">メニュー</div>
              <div class="cfFoodMetaValue">${tagHtml}</div>
            </div>
          </div>
        </article>
      `;
    }

    const grid = document.getElementById("foodGrid");
    if (grid){
      grid.innerHTML = FOODS.map(renderFoodCard).join("");
    }
  </script>
